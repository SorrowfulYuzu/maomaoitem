<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>貓貓谷道具百科｜資料庫列表版</title>
  <meta name="description" content="貓貓谷道具百科：Google Sheets 自動同步的資料庫列表版。" />
  <meta name="theme-color" content="#f6a62d" />

  <style>
    :root {
      --bg: #f5f1e8;
      --paper: #fffdf7;
      --paper-2: #fff7e6;
      --line: #ded1ba;
      --line-soft: rgba(107, 74, 38, .16);
      --text: #2f251b;
      --muted: #786a59;
      --muted-2: #9b8971;
      --brand: #f6a62d;
      --brand-2: #d86b18;
      --deep: #3a2a1b;
      --deep-2: #4b3725;
      --green: #408f4b;
      --red: #bc4b43;
      --blue: #3977ba;
      --shadow: 0 12px 28px rgba(58, 42, 27, .12);
      --radius: 12px;
      --font: "Microsoft JhengHei", "PingFang TC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, rgba(246, 166, 45, .16), transparent 30rem),
        radial-gradient(circle at 90% 20%, rgba(216, 107, 24, .10), transparent 26rem),
        var(--bg);
      min-height: 100vh;
    }

    a { color: #a34f12; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: linear-gradient(180deg, #3e2c1c, #2d2117);
      color: #fff4d6;
      border-bottom: 3px solid var(--brand);
      box-shadow: 0 8px 24px rgba(34, 22, 12, .18);
    }

    .topbar-inner {
      width: min(1420px, calc(100% - 24px));
      margin: 0 auto;
      min-height: 58px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 950;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: linear-gradient(135deg, #ffd45a, #f58422);
      color: #4a2a09;
      box-shadow: inset 0 -4px 10px rgba(69, 36, 6, .18);
    }

    .top-links {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .top-link {
      color: #fff0c5;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 13px;
      font-weight: 800;
      background: rgba(255,255,255,.06);
    }

    .top-link:hover {
      text-decoration: none;
      background: rgba(255,255,255,.12);
    }

    .layout {
      width: min(1420px, calc(100% - 24px));
      margin: 18px auto 54px;
      display: grid;
      grid-template-columns: 286px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .sidebar {
      position: sticky;
      top: 76px;
      max-height: calc(100vh - 92px);
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 247, .88);
      box-shadow: var(--shadow);
    }

    .side-title {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 13px 14px;
      background: linear-gradient(180deg, var(--paper-2), #fff);
      border-bottom: 1px solid var(--line);
      color: #5c3d17;
      font-size: 15px;
      font-weight: 950;
    }

    .side-section {
      padding: 12px 14px 14px;
      border-bottom: 1px solid var(--line-soft);
    }

    .side-section:last-child { border-bottom: 0; }

    .side-section h3 {
      margin: 0 0 9px;
      color: #6c4b26;
      font-size: 13px;
      letter-spacing: .04em;
    }

    .side-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .side-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #4d3c2a;
      border-radius: 999px;
      padding: 7px 9px;
      font: inherit;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: .14s ease;
    }

    .side-btn:hover {
      border-color: #d78b24;
      color: #9c4e0d;
      transform: translateY(-1px);
    }

    .side-btn.active {
      background: #3a2a1b;
      border-color: #3a2a1b;
      color: #fff1c6;
    }

    .main {
      min-width: 0;
    }

    .hero {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 96% 12%, rgba(246, 166, 45, .22), transparent 22rem),
        linear-gradient(180deg, #fffdf7, #fff7e6);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero-head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .crumb {
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 5px;
    }

    h1 {
      margin: 0;
      font-size: clamp(25px, 3vw, 38px);
      letter-spacing: -.04em;
      line-height: 1.12;
    }

    .hero-badge {
      border: 1px solid rgba(216, 107, 24, .24);
      background: rgba(255, 212, 90, .34);
      border-radius: 999px;
      padding: 8px 12px;
      color: #7b4310;
      font-weight: 950;
      white-space: nowrap;
      font-size: 13px;
    }

    .hero-desc {
      margin: 0;
      padding: 13px 20px;
      color: var(--muted);
      line-height: 1.75;
      font-weight: 700;
      background: rgba(255, 255, 255, .46);
    }

    .report-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-left: 10px;
      min-height: 30px;
      padding: 3px 12px;
      border-radius: 999px;
      border: 1px solid #c9791e;
      background: linear-gradient(180deg, #ffd86c, #f5a22b);
      color: #4d2d08;
      font-size: 13px;
      font-weight: 950;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.5);
      vertical-align: middle;
      white-space: nowrap;
    }

    .report-btn:hover {
      text-decoration: none;
      filter: saturate(1.06);
    }

    .control-panel {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 247, .92);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .control-title {
      padding: 11px 14px;
      background: linear-gradient(180deg, #fff8e5, #fff);
      border-bottom: 1px solid var(--line);
      font-weight: 950;
      color: #654415;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .controls {
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 170px 150px 130px auto;
      gap: 10px;
      align-items: center;
    }

    .field {
      position: relative;
      min-width: 0;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: var(--text);
      padding: 0 11px;
      font: inherit;
      font-size: 14px;
      font-weight: 750;
      outline: none;
    }

    .field input { padding-left: 36px; }

    .field input:focus,
    .field select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(246, 166, 45, .18);
    }

    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      opacity: .7;
    }

    .btn {
      min-height: 42px;
      border: 1px solid #c9791e;
      border-radius: 9px;
      padding: 0 12px;
      color: #4d2d08;
      background: linear-gradient(180deg, #ffd86c, #f5a22b);
      font: inherit;
      font-weight: 950;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.5);
      white-space: nowrap;
    }

    .btn:hover { filter: saturate(1.05); }
    .btn:active { transform: translateY(1px); }

    .btn.ghost {
      border-color: var(--line);
      background: #fff;
      color: #5a4630;
    }

    .stats {
      padding: 0 14px 14px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      border: 1px solid var(--line-soft);
      background: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      min-width: 0;
    }

    .stat b {
      display: block;
      font-size: 22px;
      letter-spacing: -.04em;
      color: #3c2a19;
    }

    .stat span {
      display: block;
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 850;
    }

    .notice {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffdf7;
      color: var(--muted);
      padding: 12px 14px;
      line-height: 1.7;
      font-weight: 750;
      box-shadow: var(--shadow);
    }

    .notice strong { color: var(--text); }

    .data-panel {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 253, 247, .94);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .data-title {
      padding: 11px 14px;
      background: linear-gradient(180deg, #fff8e5, #fff);
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #654415;
      font-weight: 950;
    }

    .table-wrap {
      overflow: auto;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f3eadb;
      color: #60431e;
      font-size: 13px;
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
    }

    td {
      border-bottom: 1px solid rgba(107, 74, 38, .12);
      padding: 9px 10px;
      vertical-align: middle;
      line-height: 1.55;
      font-size: 14px;
      font-weight: 700;
    }

    tbody tr:nth-child(even) { background: #fffaf0; }
    tbody tr:hover { background: #fff0cf; }

    .col-name { width: 220px; }
    .col-icon { width: 54px; }
    .col-id { width: 128px; }
    .col-level { width: 82px; }
    .col-location { width: 150px; }
    .col-source { width: 118px; }
    .col-action { width: 92px; text-align: right; }

    .icon-box {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf7;
      overflow: hidden;
      box-shadow: inset 0 -3px 8px rgba(58, 42, 27, .06);
    }

    .icon-box img {
      max-width: 92%;
      max-height: 92%;
      object-fit: contain;
      image-rendering: auto;
    }

    .placeholder {
      font-size: 20px;
      opacity: .86;
    }

    .item-name {
      font-weight: 950;
      color: #2c2117;
    }

    .item-desc {
      margin-top: 2px;
      max-width: 720px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      border: 1px solid rgba(107, 74, 38, .14);
      background: #fffaf0;
      padding: 4px 8px;
      color: #694719;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }

    .mini-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: #4f3c28;
      border-radius: 8px;
      padding: 6px 8px;
      font: inherit;
      font-size: 12px;
      font-weight: 950;
      cursor: pointer;
      white-space: nowrap;
    }

    .mini-btn:hover {
      border-color: var(--brand);
      color: #984b0c;
    }

    .pager {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid var(--line);
      background: #fffdf7;
      flex-wrap: wrap;
    }

    .page-info {
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
    }

    .page-buttons {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .page-btn {
      min-width: 36px;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: #4a3826;
      font: inherit;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .page-btn:hover { border-color: var(--brand); }
    .page-btn.active {
      background: #3a2a1b;
      color: #fff1c6;
      border-color: #3a2a1b;
    }

    .page-btn:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    .loading,
    .empty,
    .error {
      padding: 42px 18px;
      text-align: center;
      color: var(--muted);
      font-weight: 850;
      line-height: 1.75;
    }

    .loader {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 5px solid rgba(246, 166, 45, .18);
      border-top-color: var(--brand);
      margin: 0 auto 12px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      color: #7c332e;
      background: #fff7f5;
      text-align: left;
    }

    .error code {
      background: rgba(188, 75, 67, .08);
      padding: 2px 6px;
      border-radius: 6px;
    }

    dialog {
      width: min(860px, calc(100% - 24px));
      border: 0;
      padding: 0;
      border-radius: 14px;
      background: #fffdf7;
      color: var(--text);
      box-shadow: 0 34px 80px rgba(28, 18, 10, .35);
      overflow: hidden;
    }

    dialog::backdrop {
      background: rgba(34, 22, 12, .52);
      backdrop-filter: blur(4px);
    }

    .modal-head {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background:
        radial-gradient(circle at 100% 0, rgba(246, 166, 45, .23), transparent 20rem),
        linear-gradient(180deg, #fff8e5, #fff);
    }

    .modal-head h2 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -.03em;
      word-break: break-word;
    }

    .modal-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
    }

    .close {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      font-size: 22px;
      font-weight: 950;
      cursor: pointer;
    }

    .modal-body {
      padding: 16px;
      max-height: 72vh;
      overflow: auto;
    }

    .detail-table {
      min-width: 0;
      width: 100%;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      overflow: hidden;
    }

    .detail-table th,
    .detail-table td {
      position: static;
      border-bottom: 1px solid var(--line-soft);
      padding: 11px 12px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
      white-space: normal;
    }

    .detail-table th {
      width: 160px;
      background: #fff3d7;
      color: #6a4618;
    }

    .backtop {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 30;
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(180deg, #ffd86c, #f5a22b);
      border: 1px solid #c9791e;
      color: #4d2d08;
      box-shadow: 0 10px 24px rgba(58, 42, 27, .20);
      font-size: 24px;
      text-decoration: none;
    }

    .backtop:hover { text-decoration: none; transform: translateY(-2px); }

    footer {
      width: min(1420px, calc(100% - 24px));
      margin: 0 auto 42px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 13px;
      font-weight: 750;
      text-align: center;
    }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar {
        position: static;
        max-height: none;
      }
      .controls {
        grid-template-columns: 1fr 1fr;
      }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 620px) {
      .topbar-inner {
        min-height: auto;
        padding: 10px 0;
        align-items: flex-start;
        flex-direction: column;
      }
      .top-links { margin-left: 0; }
      .layout { width: min(100% - 14px, 1420px); margin-top: 10px; }
      .hero-head { grid-template-columns: 1fr; }
      .hero-badge { width: fit-content; }
      .controls { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
      .pager { align-items: stretch; }
      .page-buttons { width: 100%; }
      .modal-head { grid-template-columns: 42px minmax(0, 1fr) auto; }
      .modal-head h2 { font-size: 20px; }
      .detail-table th { width: 112px; }
    }
  </style>
</head>

<body>
  <header class="topbar" id="top">
    <div class="topbar-inner">
      <div class="logo">
        <span class="logo-mark">🍁</span>
        <span>貓貓谷道具百科</span>
      </div>
      <nav class="top-links" aria-label="上方選單">
        <a class="top-link" href="#database">資料列表</a>
        <a class="top-link" href="#filters">分類篩選</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="filters">
      <div class="side-title">📚 分類篩選</div>

      <section class="side-section">
        <h3>資料分頁</h3>
        <div class="side-grid" id="sheetButtons"></div>
      </section>

      <section class="side-section">
        <h3>位置篩選</h3>
        <div class="side-grid" id="fieldButtons"></div>
      </section>
    </aside>

    <main class="main">
      <section class="hero">
        <div class="hero-head">
          <div>
            <div class="crumb">首頁 / 資料庫 / 道具百科</div>
            <h1>資料列表</h1>
          </div>
          <div class="hero-badge" id="syncState">同步中</div>
        </div>
        <p class="hero-desc">
          此道具百科內容僅限於貓貓谷使用，如有錯誤或遺漏請即時反饋。
          <a class="report-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSeXjredsja9tuXXH1Dfk12iD4ocrXQhaKjtDh6FN07nRzvTQA/viewform" target="_blank" rel="noopener noreferrer">回報表單</a>
        </p>
      </section>

      <section class="control-panel">
        <div class="control-title">🔎 搜尋 / 排序 / 顯示</div>
        <div class="controls">
          <label class="field">
            <span class="search-icon">🔍</span>
            <input id="searchInput" type="search" placeholder="搜尋 ID、道具名稱、說明、來源、備註……" autocomplete="off">
          </label>

          <label class="field">
            <select id="sortSelect" aria-label="排序">
              <option value="default">排序：預設</option>
              <option value="nameAsc">名稱：A → Z</option>
              <option value="nameDesc">名稱：Z → A</option>
              <option value="idAsc">ID：小 → 大</option>
              <option value="idDesc">ID：大 → 小</option>
              <option value="sheetAsc">分類：A → Z</option>
            </select>
          </label>

          <label class="field">
            <select id="pageSizeSelect" aria-label="每頁數量">
              <option value="25">每頁 25 筆</option>
              <option value="50" selected>每頁 50 筆</option>
              <option value="100">每頁 100 筆</option>
              <option value="200">每頁 200 筆</option>
            </select>
          </label>

          <button class="btn ghost" id="clearBtn" type="button">清除</button>
          <button class="btn" id="reloadBtn" type="button">重新同步</button>
        </div>

        <div class="stats">
          <div class="stat"><b id="totalCount">0</b><span>總資料筆數</span></div>
          <div class="stat"><b id="shownCount">0</b><span>符合條件</span></div>
          <div class="stat"><b id="pageCount">0</b><span>總頁數</span></div>
          <div class="stat"><b id="sheetCount">0</b><span>資料分頁</span></div>
        </div>
      </section>

      <div class="notice" id="notice">
        <strong>正在同步：</strong>從 Google Sheets 讀取資料中……
      </div>

      <section class="data-panel" id="database">
        <div class="data-title">

        <div class="table-wrap" id="tableWrap">

            <div class="loader"></div>
            正在從 Google Sheets 讀取道具資料……
          </div>

  <dialog id="detailDialog">

  </footer>

  <script>
    /**
     * =========================================================
     * 基本設定
     * =========================================================
     */
    const SHEET_ID = "1aXcf9XOxWsEB3Mne1-wMOpBIr1QLc7lJ-6hDyQda1eY";
    const DATA_SHEETS = ["一般道具", "蘋果道具", "Boss掉落物", "喵幣道具"];

    /**
     * 最後更新時間來源：
     * 從 Google Sheets 指定儲存格讀取。
     *
     * 預設讀取「首頁」分頁的 B2。
     * 你可以在 Google Sheets 的 B2 放入日期時間，例如：
     * 2026/05/16 18:30:00
     *
     * 若你想改成其他位置，例如「首頁!D1」：
     * const LAST_UPDATED_CELL_SHEET = "首頁";
     * const LAST_UPDATED_CELL_RANGE = "N22";
     */
    const LAST_UPDATED_CELL_SHEET = "首頁";
    const LAST_UPDATED_CELL_RANGE = "N22";

    /**
     * 如果你想直接抓取 Google Sheets「插入到儲存格內」的圖示，
     * 請部署 README 內提供的 Apps Script，然後把 Web App URL 貼到這裡。
     *
     * 留空時：使用原本的 Google Sheets 公開資料讀取方式，只能讀文字/網址。
     * 填入時：改由 Apps Script 回傳資料，能讀取儲存格內的 CellImage 圖示。
     */
    const APPS_SCRIPT_DATA_ENDPOINT = "https://script.google.com/macros/s/AKfycbxNsKBjGdoByijmqLBS6GwjEULK9g9JRX5OLFdB3cmjBp_EX9QsUM-Yegz4_gFJUs3Ipg/exec";

    // Apps Script 第一次冷啟動、或需要轉換儲存格圖片時會比較慢。
    // 原本 20 秒容易誤判逾時，這裡改成 60 秒。
    const APPS_SCRIPT_TIMEOUT_MS = 60000;

    /**
     * =========================================================
     * 狀態
     * =========================================================
     */
    const state = {
      allItems: [],
      filteredItems: [],
      activeSheet: "全部",
      fieldFilter: "",
      query: "",
      sort: "default",
      page: 1,
      pageSize: 50,
      errors: []
    };

    const $ = (selector) => document.querySelector(selector);

    const els = {
      sheetButtons: $("#sheetButtons"),
      fieldButtons: $("#fieldButtons"),
      searchInput: $("#searchInput"),
      sortSelect: $("#sortSelect"),
      pageSizeSelect: $("#pageSizeSelect"),
      clearBtn: $("#clearBtn"),
      reloadBtn: $("#reloadBtn"),
      totalCount: $("#totalCount"),
      shownCount: $("#shownCount"),
      pageCount: $("#pageCount"),
      sheetCount: $("#sheetCount"),
      syncState: $("#syncState"),
      notice: $("#notice"),
      tableWrap: $("#tableWrap"),
      listSummary: $("#listSummary"),
      pageInfo: $("#pageInfo"),
      pageButtons: $("#pageButtons"),
      dialog: $("#detailDialog"),
      closeDialog: $("#closeDialog"),
      modalTitle: $("#modalTitle"),
      modalSub: $("#modalSub"),
      modalIcon: $("#modalIcon"),
      modalBody: $("#modalBody")
    };

    const nameKeys = ["名稱", "道具名稱", "物品名稱", "品名", "道具", "物品", "item", "name", "title"];
    const imageKeys = ["圖片", "圖示", "圖像", "icon", "image", "img", "圖片網址", "圖檔", "imageurl"];
    const descKeys = ["說明", "描述", "介紹", "效果", "用途", "備註", "取得方式", "來源", "掉落", "說明文字", "description", "effect", "note"];
    const idKeys = ["id", "ID", "編號", "物品ID", "道具ID", "itemid", "item id"];
    const levelKeys = ["等級", "需求等級", "Lv", "LV", "level", "Level"];
    // 左側位置篩選會自動讀取 SHEET 中「位置」欄位的所有值。

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeText(value) {
      return String(value ?? "").replace(/\s+/g, " ").trim();
    }

    function compactKey(value) {
      return String(value || "").toLowerCase().replace(/\s+/g, "");
    }

    function keyMatch(key, candidates) {
      const k = compactKey(key);
      return candidates.some(candidate => k.includes(compactKey(candidate)));
    }

    function cellToString(cell) {
      if (!cell) return "";
      const value = cell.f ?? cell.v ?? "";
      return normalizeText(value);
    }

    function findByKeys(item, candidates) {
      const hitKey = Object.keys(item.fields).find(key => keyMatch(key, candidates));
      return hitKey ? item.fields[hitKey] : "";
    }

    function extractFirstUrl(text) {
      const match = String(text || "").match(/https?:\/\/[^\s"'）)]+/i);
      return match ? match[0] : "";
    }

    function normalizeImageUrl(value) {
      let text = String(value || "").trim();

      const formulaMatch = text.match(/IMAGE\(["']([^"']+)["']/i);
      if (formulaMatch) text = formulaMatch[1];

      let url = extractFirstUrl(text) || text;
      if (!url) return "";

      const driveMatch = url.match(/drive\.google\.com\/file\/d\/([^/]+)/);
      if (driveMatch) {
        return `https://drive.google.com/uc?export=view&id=${driveMatch[1]}`;
      }

      return url;
    }

    function isProbablyImageUrl(url) {
      if (!url) return false;
      return /\.(png|jpe?g|gif|webp|svg)(\?.*)?$/i.test(url) ||
        /drive\.google\.com\/uc\?export=view/i.test(url) ||
        /googleusercontent\.com/i.test(url);
    }

    function getItemName(item) {
      const named = findByKeys(item, nameKeys);
      if (named) return named;

      const firstUseful = Object.entries(item.fields)
        .find(([key, value]) => value && !keyMatch(key, imageKeys) && !keyMatch(key, idKeys));

      return firstUseful ? firstUseful[1] : "未命名道具";
    }

    function getItemId(item) {
      const direct = findByKeys(item, idKeys);
      if (direct) return direct;

      for (const value of Object.values(item.fields)) {
        const text = String(value || "").trim();
        if (/^\d{4,}$/.test(text)) return text;
      }

      return "";
    }

    function getItemLevel(item) {
      const direct = findByKeys(item, levelKeys);
      if (direct) return direct;

      const joined = Object.values(item.fields).join(" ");
      const match = joined.match(/\b(?:Lv\.?|LV|等級)\s*[:：]?\s*(\d{1,4})\b/i);
      return match ? match[1] : "";
    }

    function getItemDescription(item) {
      const byKey = findByKeys(item, descKeys);
      if (byKey) return byKey;

      const values = Object.entries(item.fields)
        .filter(([key, value]) => value && !keyMatch(key, imageKeys) && !keyMatch(key, nameKeys) && !keyMatch(key, idKeys))
        .map(([, value]) => value);

      return values.slice(0, 2).join("｜");
    }

    function getItemPurpose(item) {
      return findByKeys(item, ["使用方式", "使用方法", "用途", "使用用途", "use", "usage"]) || "";
    }

    function getItemLocation(item) {
      return findByKeys(item, ["位置", "所在位置", "地點", "location", "place"]) || "";
    }

    function getItemImage(item) {
      if (item.imageUrl) return item.imageUrl;

      const byKey = normalizeImageUrl(findByKeys(item, imageKeys));
      if (isProbablyImageUrl(byKey)) return byKey;

      for (const value of Object.values(item.fields)) {
        const url = normalizeImageUrl(value);
        if (isProbablyImageUrl(url)) return url;
      }

      return "";
    }

    function getSearchBlob(item) {
      return [
        item.sheet,
        ...Object.keys(item.fields),
        ...Object.values(item.fields)
      ].join(" ").toLowerCase();
    }

    function parseGvizTable(table, sheetName) {
      let headers = (table.cols || []).map((col, index) => {
        const label = normalizeText(col.label || col.id || "");
        return label || `欄位${index + 1}`;
      });

      let rawRows = (table.rows || []).map(row => row.c || []);

      const usefulHeaderCount = headers.filter(h => h && !/^([A-Z]+|[a-z]+)$/.test(h)).length;
      if (usefulHeaderCount < 2 && rawRows.length > 0) {
        const firstRow = rawRows[0].map(cellToString);
        if (firstRow.filter(Boolean).length >= 2) {
          headers = firstRow.map((h, i) => h || `欄位${i + 1}`);
          rawRows = rawRows.slice(1);
        }
      }

      return rawRows.map((row, rowIndex) => {
        const fields = {};
        headers.forEach((header, index) => {
          const value = cellToString(row[index]);
          if (value !== "") fields[header] = value;
        });

        return {
          id: `${sheetName}-${rowIndex}-${Math.random().toString(36).slice(2)}`,
          originalIndex: rowIndex,
          sheet: sheetName,
          fields
        };
      }).filter(item => Object.keys(item.fields).length > 0);
    }


    function formatTaiwanDateTime(dateLike) {
      const date = dateLike instanceof Date ? dateLike : new Date(dateLike);
      if (Number.isNaN(date.getTime())) return "";

      return date.toLocaleString("zh-TW", {
        timeZone: "Asia/Taipei",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });
    }

    function parseGvizDateValue(value) {
      const text = String(value ?? "").trim();

      // Google Visualization API 有時會回傳 Date(yyyy,m,d,h,m,s)
      // 注意：月份是 0 起算，所以不需要再 -1。
      const match = text.match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})(?:,(\d{1,2}),(\d{1,2}),(\d{1,2}))?\)$/);
      if (match) {
        const [, year, month, day, hour = "0", minute = "0", second = "0"] = match;
        return new Date(Number(year), Number(month), Number(day), Number(hour), Number(minute), Number(second));
      }

      return null;
    }

    function formatCellDateTime(cell) {
      if (!cell) return "";

      // f 通常是 Google Sheets 依照儲存格格式顯示出來的文字。
      // 如果你把該格設為日期與時間格式，優先使用 f 最接近表格上的顯示。
      const formatted = normalizeText(cell.f || "");
      if (formatted) return formatted;

      const raw = cell.v ?? "";
      const parsedGvizDate = parseGvizDateValue(raw);
      if (parsedGvizDate) return formatTaiwanDateTime(parsedGvizDate);

      const normalDate = new Date(raw);
      if (!Number.isNaN(normalDate.getTime())) return formatTaiwanDateTime(normalDate);

      return normalizeText(raw);
    }

    function loadCellByJsonp(sheetName, cellRange) {
      return new Promise((resolve, reject) => {
        const callbackName = `__catpedia_cell_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const timeoutMs = 15000;

        const script = document.createElement("script");

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error(`讀取最後更新時間儲存格「${sheetName}!${cellRange}」逾時`));
        }, timeoutMs);

        function cleanup() {
          clearTimeout(timer);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (response) => {
          cleanup();

          if (!response || response.status === "error") {
            const message = response?.errors?.map(err => err.detailed_message || err.message).join("；") || "Google Sheets 回傳錯誤";
            reject(new Error(`最後更新時間讀取失敗：${message}`));
            return;
          }

          const cell = response.table?.rows?.[0]?.c?.[0] || null;
          resolve(formatCellDateTime(cell));
        };

        const tqx = encodeURIComponent(`out:json;responseHandler:${callbackName}`);
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&range=${encodeURIComponent(cellRange)}&headers=0&tqx=${tqx}`;
        script.async = true;
        script.onerror = () => {
          cleanup();
          reject(new Error(`無法讀取最後更新時間儲存格「${sheetName}!${cellRange}」`));
        };

        document.body.appendChild(script);
      });
    }

    function loadSheetByJsonp(sheetName) {
      return new Promise((resolve, reject) => {
        const callbackName = `__catpedia_db_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const timeoutMs = 15000;

        const script = document.createElement("script");

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error(`讀取「${sheetName}」逾時`));
        }, timeoutMs);

        function cleanup() {
          clearTimeout(timer);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (response) => {
          cleanup();

          if (!response || response.status === "error") {
            const message = response?.errors?.map(err => err.detailed_message || err.message).join("；") || "Google Sheets 回傳錯誤";
            reject(new Error(`「${sheetName}」讀取失敗：${message}`));
            return;
          }

          resolve(parseGvizTable(response.table, sheetName));
        };

        const tqx = encodeURIComponent(`out:json;responseHandler:${callbackName}`);
        script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&headers=1&tqx=${tqx}`;
        script.async = true;
        script.onerror = () => {
          cleanup();
          reject(new Error(`無法連線到「${sheetName}」`));
        };

        document.body.appendChild(script);
      });
    }


    function loadAppsScriptDataByJsonp(endpoint) {
      return new Promise((resolve, reject) => {
        const cleanEndpoint = String(endpoint || "").trim();
        if (!cleanEndpoint) {
          resolve(null);
          return;
        }

        const callbackName = `__catpedia_apps_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const timeoutMs = APPS_SCRIPT_TIMEOUT_MS;
        const script = document.createElement("script");

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("Apps Script 資料讀取逾時：請確認 Web App 權限是「任何人」，網址使用 /exec，或改用新版快取 Apps Script"));
        }, timeoutMs);

        function cleanup() {
          clearTimeout(timer);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (response) => {
          cleanup();

          if (!response) {
            reject(new Error("Apps Script 沒有回傳資料"));
            return;
          }

          if (response.error) {
            reject(new Error(response.error));
            return;
          }

          const items = Array.isArray(response.items) ? response.items.map((item, index) => ({
            id: item.id || `${item.sheet || "AppsScript"}-${index}-${Math.random().toString(36).slice(2)}`,
            originalIndex: Number.isFinite(item.originalIndex) ? item.originalIndex : index,
            sheet: item.sheet || "未分類",
            fields: item.fields || {},
            imageUrl: item.imageUrl || ""
          })) : [];

          resolve({
            items,
            lastUpdated: response.lastUpdated || "",
            generatedAt: response.generatedAt || ""
          });
        };

        const separator = cleanEndpoint.includes("?") ? "&" : "?";
        script.src = `${cleanEndpoint}${separator}callback=${encodeURIComponent(callbackName)}&t=${Date.now()}`;
        script.async = true;
        script.onerror = () => {
          cleanup();
          reject(new Error("無法連線到 Apps Script Web App"));
        };

        document.body.appendChild(script);
      });
    }

    async function loadAllSheets() {
      state.errors = [];
      state.allItems = [];
      state.filteredItems = [];
      state.page = 1;

      els.syncState.textContent = "同步中";
      els.notice.innerHTML = "<strong>正在同步：</strong>從 Google Sheets 讀取資料中……";
      els.tableWrap.innerHTML = `<div class="loading"><div class="loader"></div>正在從 Google Sheets 讀取道具資料……</div>`;
      els.listSummary.textContent = "讀取中";

      let items = [];
      let appsScriptPayload = null;

      if (APPS_SCRIPT_DATA_ENDPOINT.trim()) {
        try {
          appsScriptPayload = await loadAppsScriptDataByJsonp(APPS_SCRIPT_DATA_ENDPOINT);
          items = appsScriptPayload?.items || [];
        } catch (error) {
          state.errors.push(error.message || "Apps Script 資料讀取失敗。請確認 Apps Script 已重新部署，權限為「任何人」，且 Web App URL 結尾是 /exec。");
        }
      } else {
        const results = await Promise.allSettled(DATA_SHEETS.map(loadSheetByJsonp));

        results.forEach((result, index) => {
          const sheetName = DATA_SHEETS[index];
          if (result.status === "fulfilled") {
            items.push(...result.value);
          } else {
            state.errors.push(result.reason?.message || `「${sheetName}」讀取失敗`);
          }
        });
      }

      state.allItems = items;
      buildSidebar();

      if (items.length > 0) {
        els.syncState.textContent = "同步完成";

        if (appsScriptPayload?.lastUpdated) {
          els.notice.innerHTML = `<strong>同步完成：</strong>最後更新時間 ${escapeHtml(appsScriptPayload.lastUpdated)}`;
        } else {
          try {
            const lastUpdatedText = await loadCellByJsonp(LAST_UPDATED_CELL_SHEET, LAST_UPDATED_CELL_RANGE);
            if (lastUpdatedText) {
              els.notice.innerHTML = `<strong>同步完成：</strong>最後更新時間 ${escapeHtml(lastUpdatedText)}`;
            } else {
              els.notice.innerHTML = `<strong>同步完成：</strong>最後更新時間未填寫，請檢查 ${escapeHtml(LAST_UPDATED_CELL_SHEET)}!${escapeHtml(LAST_UPDATED_CELL_RANGE)}`;
            }
          } catch (error) {
            console.warn(error);
            els.notice.innerHTML = `<strong>同步完成：</strong>最後更新時間讀取失敗，請檢查 ${escapeHtml(LAST_UPDATED_CELL_SHEET)}!${escapeHtml(LAST_UPDATED_CELL_RANGE)}`;
          }
        }

        applyFilters();
      } else {
        els.syncState.textContent = "同步失敗";
        renderError();
      }
    }

    function buildSidebar() {
      const counts = new Map();
      DATA_SHEETS.forEach(sheet => counts.set(sheet, 0));
      state.allItems.forEach(item => counts.set(item.sheet, (counts.get(item.sheet) || 0) + 1));

      const sheetButtons = [
        { name: "全部", count: state.allItems.length },
        ...DATA_SHEETS.map(sheet => ({ name: sheet, count: counts.get(sheet) || 0 }))
      ];

      els.sheetButtons.innerHTML = sheetButtons.map(button => `
        <button class="side-btn ${state.activeSheet === button.name ? "active" : ""}" type="button" data-sheet="${escapeHtml(button.name)}">
          ${escapeHtml(button.name)} ${button.count}
        </button>
      `).join("");

      els.sheetButtons.querySelectorAll("[data-sheet]").forEach(button => {
        button.addEventListener("click", () => {
          state.activeSheet = button.dataset.sheet;
          state.page = 1;
          buildSidebar();
          applyFilters();
        });
      });

      const locations = Array.from(new Set(
        state.allItems
          .map(item => getItemLocation(item))
          .map(value => normalizeText(value))
          .filter(Boolean)
      )).sort((a, b) => a.localeCompare(b, "zh-Hant"));

      els.fieldButtons.innerHTML = [
        `<button class="side-btn ${state.fieldFilter === "" ? "active" : ""}" type="button" data-field="">不限位置</button>`,
        ...locations.map(location => `
          <button class="side-btn ${state.fieldFilter === location ? "active" : ""}" type="button" data-field="${escapeHtml(location)}">
            ${escapeHtml(location)}
          </button>
        `)
      ].join("");

      els.fieldButtons.querySelectorAll("[data-field]").forEach(button => {
        button.addEventListener("click", () => {
          state.fieldFilter = button.dataset.field;
          state.page = 1;
          buildSidebar();
          applyFilters();
        });
      });
    }

    function applyFilters() {
      const query = state.query.trim().toLowerCase();

      let filtered = state.allItems.filter(item => {
        if (state.activeSheet !== "全部" && item.sheet !== state.activeSheet) return false;

        if (state.fieldFilter) {
          const location = normalizeText(getItemLocation(item));
          if (location !== state.fieldFilter) return false;
        }

        if (query && !getSearchBlob(item).includes(query)) return false;

        return true;
      });

      filtered = sortItems(filtered);
      state.filteredItems = filtered;
      render();
    }

    function sortItems(items) {
      const arr = [...items];

      const byName = (a, b) => getItemName(a).localeCompare(getItemName(b), "zh-Hant");
      const bySheet = (a, b) => a.sheet.localeCompare(b.sheet, "zh-Hant") || byName(a, b);
      const numericId = (item) => {
        const id = getItemId(item);
        const n = Number(String(id).replace(/[^\d.-]/g, ""));
        return Number.isFinite(n) ? n : Number.MAX_SAFE_INTEGER;
      };

      if (state.sort === "nameAsc") arr.sort(byName);
      if (state.sort === "nameDesc") arr.sort((a, b) => byName(b, a));
      if (state.sort === "sheetAsc") arr.sort(bySheet);
      if (state.sort === "idAsc") arr.sort((a, b) => numericId(a) - numericId(b) || byName(a, b));
      if (state.sort === "idDesc") arr.sort((a, b) => numericId(b) - numericId(a) || byName(a, b));

      return arr;
    }

    function render() {
      const totalPages = Math.max(1, Math.ceil(state.filteredItems.length / state.pageSize));
      state.page = Math.min(Math.max(1, state.page), totalPages);

      els.totalCount.textContent = state.allItems.length;
      els.shownCount.textContent = state.filteredItems.length;
      els.pageCount.textContent = totalPages;
      els.sheetCount.textContent = DATA_SHEETS.length;
      els.listSummary.textContent = `${state.filteredItems.length} 筆 / 共 ${state.allItems.length} 筆`;

      if (state.filteredItems.length === 0) {
        els.tableWrap.innerHTML = `
          <div class="empty">
            沒有找到符合條件的資料。<br>
            可以改用其他關鍵字，或切回「全部」分類。
          </div>
        `;
        renderPager(totalPages);
        return;
      }

      const start = (state.page - 1) * state.pageSize;
      const pageItems = state.filteredItems.slice(start, start + state.pageSize);

      els.tableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th class="col-icon">圖示</th>
              <th class="col-name">道具名稱</th>
              <th>使用方式</th>
              <th class="col-location">位置</th>
              <th class="col-source">分類</th>
              <th class="col-action">詳情</th>
            </tr>
          </thead>
          <tbody>
            ${pageItems.map(createRowHtml).join("")}
          </tbody>
        </table>
      `;

      els.tableWrap.querySelectorAll("[data-open-detail]").forEach(button => {
        button.addEventListener("click", () => {
          const item = state.filteredItems.find(entry => entry.id === button.dataset.openDetail);
          if (item) openDetail(item);
        });
      });

      renderPager(totalPages);
    }

    function createRowHtml(item) {
      const name = getItemName(item);
      const purpose = getItemPurpose(item);
      const location = getItemLocation(item);
      const image = getItemImage(item);
      const icon = image
        ? `<img src="${escapeHtml(image)}" alt="${escapeHtml(name)}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('span'), {className: 'placeholder', textContent: '🎒'}))">`
        : `<span class="placeholder">🎒</span>`;

      return `
        <tr>
          <td class="col-icon"><div class="icon-box">${icon}</div></td>
          <td class="col-name">
            <div class="item-name">${escapeHtml(name)}</div>
          </td>
          <td>
            <div class="item-name">${escapeHtml(purpose || "尚無使用方式資料")}</div>
          </td>
          <td class="col-location">${location ? `<span class="tag">${escapeHtml(location)}</span>` : `<span style="color: var(--muted-2);">—</span>`}</td>
          <td class="col-source"><span class="tag">${escapeHtml(item.sheet)}</span></td>
          <td class="col-action"><button class="mini-btn" type="button" data-open-detail="${escapeHtml(item.id)}">詳情</button></td>
        </tr>
      `;
    }

    function renderPager(totalPages) {
      const total = state.filteredItems.length;
      const start = total === 0 ? 0 : (state.page - 1) * state.pageSize + 1;
      const end = Math.min(state.page * state.pageSize, total);

      els.pageInfo.textContent = `第 ${state.page} / ${totalPages} 頁｜顯示 ${start}-${end} / ${total}`;

      const pages = getPageNumbers(state.page, totalPages);
      els.pageButtons.innerHTML = `
        <button class="page-btn" type="button" data-page="prev" ${state.page <= 1 ? "disabled" : ""}>‹</button>
        ${pages.map(page => page === "..."
          ? `<button class="page-btn" type="button" disabled>…</button>`
          : `<button class="page-btn ${page === state.page ? "active" : ""}" type="button" data-page="${page}">${page}</button>`
        ).join("")}
        <button class="page-btn" type="button" data-page="next" ${state.page >= totalPages ? "disabled" : ""}>›</button>
      `;

      els.pageButtons.querySelectorAll("[data-page]").forEach(button => {
        button.addEventListener("click", () => {
          const value = button.dataset.page;
          if (value === "prev") state.page -= 1;
          else if (value === "next") state.page += 1;
          else state.page = Number(value);
          render();
          document.querySelector("#database").scrollIntoView({ behavior: "smooth", block: "start" });
        });
      });
    }

    function getPageNumbers(current, total) {
      if (total <= 7) return Array.from({ length: total }, (_, index) => index + 1);

      const pages = [1];
      const left = Math.max(2, current - 1);
      const right = Math.min(total - 1, current + 1);

      if (left > 2) pages.push("...");
      for (let page = left; page <= right; page++) pages.push(page);
      if (right < total - 1) pages.push("...");
      pages.push(total);

      return pages;
    }

    function formatDetailValue(value) {
      const raw = String(value || "");
      const url = extractFirstUrl(raw);

      if (url && raw.trim() === url) {
        return `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a>`;
      }

      if (url) {
        return escapeHtml(raw).replace(escapeHtml(url), `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a>`);
      }

      return escapeHtml(raw);
    }

    function openDetail(item) {
      const name = getItemName(item);
      const id = getItemId(item);
      const level = getItemLevel(item);
      const image = getItemImage(item);

      const icon = image
        ? `<img src="${escapeHtml(image)}" alt="${escapeHtml(name)}" onerror="this.replaceWith(Object.assign(document.createElement('span'), {className: 'placeholder', textContent: '🎒'}))">`
        : `<span class="placeholder">🎒</span>`;

      els.modalTitle.textContent = name;
      els.modalSub.textContent = `${item.sheet}${id ? " / ID " + id : ""}${level ? " / Lv." + level : ""}`;
      els.modalIcon.innerHTML = icon;

      const rows = Object.entries(item.fields)
        .filter(([key]) => !keyMatch(key, imageKeys))
        .map(([key, value]) => `
          <tr>
            <th>${escapeHtml(key)}</th>
            <td>${formatDetailValue(value)}</td>
          </tr>
        `).join("");

      els.modalBody.innerHTML = `
        <table class="detail-table">
          <tbody>
            <tr><th>資料分頁</th><td>${escapeHtml(item.sheet)}</td></tr>
            ${rows}
          </tbody>
        </table>
      `;

      els.dialog.showModal();
    }

    function renderError() {
      const errors = state.errors.length ? state.errors : ["沒有讀到任何資料"];
      els.tableWrap.innerHTML = `
        <div class="error">
          <h2>讀取 Google Sheets 失敗</h2>
          <p>請檢查：</p>
          <ol>
            <li>Google Sheets 共用權限是否為 <code>知道連結的任何人：檢視者</code>。</li>
            <li>分頁名稱是否完全一致：<code>${DATA_SHEETS.map(escapeHtml).join("</code>、<code>")}</code>。</li>
            <li>第一列是否為欄位名稱，例如：名稱、圖片、說明、取得方式、備註。</li>
            <li>若仍失敗，可到 Google Sheets 使用「檔案 → 共用 → 發佈到網路」。</li>
          </ol>
          <p><strong>錯誤訊息：</strong>${errors.map(escapeHtml).join(" / ")}</p>
        </div>
      `;

      els.notice.innerHTML = "<strong>同步失敗：</strong>網站無法讀到 Google Sheets。";
      els.totalCount.textContent = 0;
      els.shownCount.textContent = 0;
      els.pageCount.textContent = 0;
      els.sheetCount.textContent = DATA_SHEETS.length;
      els.listSummary.textContent = "同步失敗";
      renderPager(1);
    }

    function debounce(fn, wait = 130) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), wait);
      };
    }

    els.searchInput.addEventListener("input", debounce((event) => {
      state.query = event.target.value;
      state.page = 1;
      applyFilters();
    }));

    els.sortSelect.addEventListener("change", (event) => {
      state.sort = event.target.value;
      state.page = 1;
      applyFilters();
    });

    els.pageSizeSelect.addEventListener("change", (event) => {
      state.pageSize = Number(event.target.value);
      state.page = 1;
      applyFilters();
    });

    els.clearBtn.addEventListener("click", () => {
      state.query = "";
      state.sort = "default";
      state.activeSheet = "全部";
      state.fieldFilter = "";
      state.page = 1;

      els.searchInput.value = "";
      els.sortSelect.value = "default";

      buildSidebar();
      applyFilters();
      els.searchInput.focus();
    });

    els.reloadBtn.addEventListener("click", () => loadAllSheets());

    els.closeDialog.addEventListener("click", () => els.dialog.close());

    els.dialog.addEventListener("click", (event) => {
      const rect = els.dialog.getBoundingClientRect();
      const outside =
        event.clientX < rect.left ||
        event.clientX > rect.right ||
        event.clientY < rect.top ||
        event.clientY > rect.bottom;

      if (outside) els.dialog.close();
    });

    loadAllSheets();
  </script>
</body>
</html>
